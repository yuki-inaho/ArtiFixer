[workspace]
channels = ["conda-forge"]
name = "artifixer"
platforms = [{ platform = "linux-64", cuda = "12" }]
version = "0.1.0"

[dependencies]
python = "3.11.*"
pip = ">=25"
setuptools = ">=70,<72.1"
pytorch-gpu = ">=2.10,<3"
torchvision = ">=0.26,<0.27"
cuda-version = "12.9.*"
cuda-nvcc = "12.9.*"
cuda-cudart-dev = ">=12.9,<13"
cuda-nvrtc-dev = "12.9.*"
libcublas-dev = ">=12.9,<13"
libcusparse-dev = ">=12.5,<13"
libcusolver-dev = ">=11.7,<12"
compilers = ">=1.11"
cmake = ">=3.28"
ninja = ">=1.12"
pkg-config = "*"
libgl-devel = "*"

[activation]
env = { CUDA_HOME = "$CONDA_PREFIX", TORCH_CUDA_ARCH_LIST = "8.9", TCNN_CUDA_ARCHITECTURES = "89", MAX_JOBS = "2", CC = "$CONDA_PREFIX/bin/x86_64-conda-linux-gnu-cc", CXX = "$CONDA_PREFIX/bin/x86_64-conda-linux-gnu-c++" }
scripts = ["scripts/activate_slang_runtime.sh"]

[feature.slang-runtime.dependencies]
sysroot_linux-64 = "2.34.*"

[environments]
slang-runtime = { features = ["slang-runtime"], no-default-feature = true }

[tasks]
check = "python -c \"import torch; assert torch.cuda.is_available(), 'CUDA is unavailable'; print(f'ArtiFixer Pixi ready: torch={torch.__version__}, CUDA={torch.version.cuda}, GPU={torch.cuda.get_device_name(0)}')\""
install-3dgrut = "python -m pip install --no-cache-dir --no-build-isolation -r thirdparty/3DGRUT-ArtiFixer/requirements.txt && python -m pip install --no-build-isolation -e thirdparty/3DGRUT-ArtiFixer"
install-artifixer = "python -m pip install --no-cache-dir accelerate==1.13.0 diffusers==0.37.1 transformers==5.5.0 ftfy einops scipy wandb tqdm Pillow matplotlib opencv-python-headless pyyaml torchmetrics imageio-ffmpeg h5py av torch-fidelity"
install-moge = "python -m pip install --no-cache-dir git+https://github.com/microsoft/MoGe.git"
install-slangc = "bash thirdparty/3DGRUT-ArtiFixer/scripts/install_slangc.sh $CONDA_PREFIX"
smoke = "python tests/container_sanity_check.py"
smoke-3dgrut = "python thirdparty/3DGRUT-ArtiFixer/tests/test_build_3dgut.py"
